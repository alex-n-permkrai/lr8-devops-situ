apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert --chart
    kompose.version: 1.34.0
  labels:
    io.kompose.service: grafana
  name: grafana
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: {{ .Values.EXTERNAL_PORT }}
      targetPort: 3000
  externalIPs:
    - {{ .Values.EXTERNAL_IP | quote }}
  selector:
    io.kompose.service: grafana
